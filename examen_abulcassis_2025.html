<style>
:root{--red:#8b0000;--blue:#1976d2;--green:#1b5e20;--orange:#ef6c00;--bg:#f4f6f8}
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background:var(--bg);margin:0;padding:16px;color:#222;line-height:1.55}
.container{max-width:1000px;margin:auto;background:white;padding:22px;border-radius:16px;box-shadow:0 4px 18px rgba(0,0,0,.08)}
h1{text-align:center;color:var(--red);margin:8px 0 4px}
.subtitle{text-align:center;color:#666;margin-bottom:20px}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-top:18px}
.card{background:#f8f9fb;border:1px solid #ddd;border-radius:13px;padding:15px;cursor:pointer}
.card:hover{background:#eef6ff}
.card b{color:#111}
.big{font-size:18px}
.exam{background:#fff8e1;border-left:6px solid #f9a825}
.topbar{position:sticky;top:0;background:#fff8e1;border:1px solid #f9a825;border-radius:12px;padding:10px;text-align:center;margin-bottom:16px;z-index:5}
.qbox{background:#fff;border:1px solid #ddd;border-radius:14px;padding:18px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.qtitle{font-size:19px;font-weight:bold;margin-bottom:14px}
.origin{display:inline-block;background:#e3f2fd;color:#0d47a1;padding:4px 9px;border-radius:8px;font-size:13px;font-weight:bold;margin-bottom:8px}
.option{display:block;border:1px solid #ddd;border-radius:10px;padding:11px;margin:8px 0;cursor:pointer}
.option:hover{background:#f1f5ff}
.option input{margin-right:8px}
.good{background:#e8f5e9!important;color:var(--green);font-weight:bold;border-color:#81c784}
.bad{background:#ffebee!important;color:#b71c1c;text-decoration:line-through;border-color:#ef9a9a}
button{padding:11px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:15px;margin:6px}
.mainBtn{background:var(--blue);color:white}
.menuBtn{background:var(--red);color:white}
.grayBtn{background:#555;color:white}
.orangeBtn{background:var(--orange);color:white}
.greenBtn{background:#2e7d32;color:white}
.feedback{margin-top:15px;padding:12px;border-radius:10px;background:#f8f8f8;border-left:5px solid var(--blue)}
.hidden{display:none}
.result{background:#eef6ff;border-left:5px solid var(--blue);border-radius:12px;padding:16px;margin:20px 0;text-align:center}
.errItem{background:#fff;border:1px solid #ddd;border-radius:12px;padding:13px;margin:10px 0}
.dashboard-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px}
.dashboard-table th,.dashboard-table td{border:1px solid #ddd;padding:8px;text-align:left}
.dashboard-table th{background:#eef6ff}
.progress-wrap{background:#eee;border-radius:8px;overflow:hidden;height:12px;min-width:100px}
.progress-bar{background:#1976d2;height:12px;width:0%}
.footer{text-align:center;color:#777;margin-top:22px;font-size:13px}
@media(max-width:600px){
 body{padding:8px}
 .container{padding:14px}
 .qtitle{font-size:17px}
 .dashboard-table{font-size:12px}
 button{width:100%;margin:5px 0}
}
</style>
</head>

rge granular lymphocyte", "Contient des granulations cytotoxiques", "Effectue sa maturation au niveau du thymus"], "correct": [0, 1, 2], "exp": "Le NK est une cellule tueuse, aussi appelée large granular lymphocyte, avec des granulations cytotoxiques. Sa maturation n’est pas thymique comme celle des LT.", "id": "ABUL2025-16"}, {"course": "Cellules du SI", "q": "Les cellules dendritiques DC :", "options": ["Capturent et présentent l’antigène aux lymphocytes", "Sont présentes dans tous les tissus", "Apprêtent les antigènes avant de les présenter", "Présentent les antigènes au niveau des organes lymphoïdes primaires"], "correct": [0, 1, 2], "exp": "Les cellules dendritiques capturent, apprêtent et présentent les antigènes. La présentation active se fait surtout dans les organes lymphoïdes secondaires.", "id": "ABUL2025-17"}]}, {"title": "Antigènes", "questions": [{"course": "Antigènes", "q": "Un antigène est caractérisé par :", "options": ["Sa nature", "Son poids moléculaire", "Sa dose et voie d’administration", "Sa structure lipidique unique"], "correct": [0, 1, 2], "exp": "L’immunogénicité dépend notamment de la nature de l’antigène, de sa masse moléculaire, de sa dose et de sa voie d’administration.", "id": "ABUL2025-12"}]}, {"title": "Immunité innée", "questions": [{"course": "Immunité innée", "q": "L’immunité naturelle est dite aussi :", "options": ["Immunité innée", "Responsable de la protection initiale de l’organisme", "Immunité acquise", "Immunité adaptative"], "correct": [0, 1], "exp": "L’immunité naturelle est l’immunité innée. Elle assure la première protection initiale de l’organisme.", "id": "ABUL2025-13"}, {"course": "Immunité innée", "q": "L’immunité naturelle est :", "options": ["Spécifique", "Durable", "Transitoire", "Rapide"], "correct": [2, 3], "exp": "L’immunité innée est rapide, peu spécifique et transitoire. La spécificité et la mémoire caractérisent surtout l’immunité adaptative.", "id": "ABUL2025-15"}, {"course": "Immunité innée", "q": "Les TLR (Toll Like Receptor) :", "options": ["Sont au nombre de 15", "Sont spécifiques des cellules immunes", "Exprimés uniquement à la surface cellulaire", "Structure comportant 3 domaines"], "correct": [3], "exp": "Les TLR ont une structure en 3 domaines : extracellulaire de reconnaissance, transmembranaire et intracellulaire de signalisation. Ils ne sont pas uniquement de surface et ne sont pas exclusivement immunitaires.", "id": "ABUL2025-27"}, {"course": "Immunité innée", "q": "Le déroulement de la réponse innée :", "options": ["Dégradation se fait à l’extérieur de la cellule", "Reconnaissance de l’agent pathogène", "La phagocytose est une étape incontournable", "Le déclenchement se fait par le biais de plusieurs médiateurs"], "correct": [1, 3], "exp": "La réponse innée débute par la reconnaissance de l’agent pathogène et fait intervenir plusieurs médiateurs. La phagocytose est importante mais pas toujours obligatoire dans toutes les réponses innées.", "id": "ABUL2025-28"}, {"course": "Immunité innée", "q": "Les TLR (Toll Like Receptor) :", "options": ["Sont des PRR (pattern recognition receptors)", "Exprimés uniquement à la surface cellulaire", "Sont spécifiques des cellules immunes", "Ont pour ligands des PAMPs absents sur les cellules hôtes"], "correct": [0, 3], "exp": "Les TLR sont des PRR reconnaissant des PAMPs absents des cellules hôtes. Ils peuvent être membranaires ou endosomaux, et ne sont pas uniquement propres aux cellules immunes.", "id": "ABUL2025-35"}, {"course": "Immunité innée", "q": "Les défenses innées comprennent :", "options": ["Les barrières épithéliales", "Les peptides antimicrobiens", "Les lymphocytes T", "Les cellules Natural Killer (NK)"], "correct": [0, 1, 3], "exp": "Les défenses innées comprennent les barrières épithéliales, peptides antimicrobiens, phagocytes, complément et NK. Les LT appartiennent surtout à l’immunité adaptative.", "id": "ABUL2025-36"}]}, {"title": "Immunité adaptative", "questions": [{"course": "Immunité adaptative", "q plexe C1 estérase"], "correct": [0, 1], "exp": "C3b favorise l’opsonisation. Le CAM entraîne la lyse cellulaire. C3a est surtout anaphylatoxine ; C1 estérase n’est pas le complexe lytique.", "id": "ABUL2025-23"}]}, {"title": "CMH", "questions": [{"course": "CMH", "q": "Le complexe majeur d’histocompatibilité est caractérisé par :", "options": ["Polymorphisme", "Rapidité du rejet", "Non reconnaissance du soi", "Reconnaissance du non-soi"], "correct": [0, 1], "exp": "Le CMH est hautement polymorphe et joue un rôle majeur dans le rejet de greffe. Les notions de reconnaissance du soi/non-soi sont liées à l’immunité, mais ce ne sont pas les caractères génétiques principaux du CMH.", "id": "ABUL2025-24"}, {"course": "CMH", "q": "Fonctions du CMH :", "options": ["Présentation de l’antigène", "Orchestre l’éducation du LT au cours de sa maturation", "Interagit avec le NK en émettant un signal négatif devant une cellule saine", "Interagit avec le NK en émettant un signal positif devant une cellule saine"], "correct": [0, 1, 2], "exp": "Le CMH présente les peptides antigéniques, participe à l’éducation thymique des LT et fournit un signal inhibiteur aux NK lorsque la cellule est saine.", "id": "ABUL2025-25"}, {"course": "CMH", "q": "Les molécules HLA :", "options": ["Sont codées par les gènes du complexe majeur d’histocompatibilité (CMH)", "Classe II sont exprimées sur toutes les cellules nucléées de l’organisme", "Classe I présentent des peptides dérivés de protéines endogènes au LT CD8", "Classe I comprend les molécules HLA-A seulement"], "correct": [0, 2], "exp": "Les molécules HLA sont codées par le CMH. HLA I est exprimé sur presque toutes les cellules nucléées et présente des peptides endogènes aux LT CD8. HLA II est exprimé surtout par les CPA.", "id": "ABUL2025-33"}]}, {"title": "Cytokines", "questions": [{"course": "Cytokines", "q": "Cytokines :", "options": ["Molécule de communication", "Assure les échanges intercellulaires", "Coopération entre différentes molécules", "Ne dépasse pas le nombre de 10"], "correct": [0, 1, 2], "exp": "Les cytokines sont des molécules de communication intercellulaire. Elles agissent en réseau avec redondance, synergie et antagonisme. Elles sont bien plus de 10.", "id": "ABUL2025-26"}, {"course": "Cytokines", "q": "Les modes d’actions exercés par les cytokines peuvent être :", "options": ["Autocrine", "Exocrine", "Paracrine", "Endocrine"], "correct": [0, 2, 3], "exp": "Les cytokines agissent de façon autocrine, paracrine ou endocrine. Le mode exocrine n’est pas retenu.", "id": "ABUL2025-34"}]}, {"title": "Réponse immunitaire cellulaire", "questions": [{"course": "Réponse immunitaire cellulaire", "q": "Le déroulement de la réaction immunitaire cellulaire :", "options": ["A pour but de diriger les cellules du sang vers le site de la lésion", "Passe par une adhésion forte induite par la sélectine", "Passe par le homing guidé par l’activation locale", "Se termine par la diapédèse"], "correct": [0, 2, 3], "exp": "Le recrutement cellulaire dirige les cellules vers le site inflammatoire, implique chimiokines/homing et se termine par la diapédèse. Les sélectines interviennent surtout dans le roulement, alors que l’adhésion forte dépend surtout des intégrines.", "id": "ABUL2025-29"}]}, {"title": "Réponse immunitaire adaptative", "questions": [{"course": "Réponse immunitaire adaptative", "q": "Le lymphocyte T helper :", "options": ["Est capable de reconnaître un antigène tout seul", "A besoin d’une cellule présentatrice d’antigène pour reconnaître un antigène", "Reconnaît l’antigène sans apprêtement", "L’apprêtement est obligatoire pour la reconnaissance de l’antigène natif"], "correct": [1, 3], "exp": "Le LT helper reconnaît un peptide antigénique apprêté et présenté par une CPA via le CMH II. Il ne reconnaît pas l’antigène natif seul.", "id": "ABUL2025-30"}, {"course": "Réponse immunitaire adaptative", "q": "L’apprêtement des antigènes :", "options": ["N’est pas nécessaire, mais permet une reconnaissance plus rapide par le TCR", "Se fait uniquement par les CPA professionnelles", "Indispensable pour une reconnaissance par le LT", "Comprend une étape de dégradation des antigènes en peptides"], "correct": [2, 3], "exp": "Les LT reconnaissent des peptides apprêtés et présentés par le CMH. L’apprêtement comprend la dégradation des antigènes en peptides.", "id": "ABUL2025-37"}]}, {"title": "Réponse humorale", "questions": [{"course": "Réponse humorale", "q": "Réponse secondaire dans la réponse immunitaire humorale :", "options": ["Se déroule en 3 phases", "Les LB mémoires sont quiescents", "Plus rapide", "Les Ig ont plus d’affinité et sont de type gamma"], "correct": [1, 2, 3], "exp": "La réponse secondaire dépend des LB mémoires quiescents, elle est plus rapide, plus intense et produit surtout des IgG de meilleure affinité.", "id": "ABUL2025-31"}, {"course": "Réponse humorale", "q": "Quels sont les LT effecteurs aidant le plus les LB à se différencier en plasmocytes et LB mémoires ?", "options": ["Les LTH1", "Les LTH2", "Les LTH17", "Les LTreg"], "correct": [1], "exp": "Les LTH2 favorisent la réponse humorale, la prolifération/différenciation des LB et la production d’anticorps.", "id": "ABUL2025-39"}]}, {"title": "Introduction", "questions": [{"course": "Introduction", "q": "Immunité est l’ensemble des mécanismes qui visent :", "options": ["Reconnaître le soi", "Rejeter le soi", "Rejeter le non-soi", "Tolérer le non-soi"], "correct": [0, 2], "exp": "L’immunité vise à reconnaître le soi et à éliminer/rejeter le non-soi. Elle tolère normalement le soi, pas le non-soi.", "id": "ABUL2025-40"}]}];
let session = {title:"", questions:[], current:0, corrected:false, score:0, answered:0, missed:[], stats:{}, mastery:false};

function shuffle(arr){const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;}
function same(a,b){a=[...a].sort((x,y)=>x-y); b=[...b].sort((x,y)=>x-y); return a.length===b.length && a.every((v,i)=>v===b[i]);}
function letters(indices){return indices.map(i=>String.fromCharCode(65+i)).join(", ");}
function allQuestions(){return COURSES.flatMap(c=>c.questions.map(q=>({...q})));}
function initStats(qs){const stats={}; qs.forEach(q=>{if(!stats[q.course]) stats[q.course]={good:0,total:0,missed:0}; stats[q.course].total++;}); return stats;}

    <b class="big">🎲 Mode Examen</b><br>Mélange les 40 questions.<br><b>${total} QCM</b>
  </div><div class="menu-grid">`;
  COURSES.forEach((c,idx)=>{html+=`<div class="card" onclick="startSession('${escapeAttr(c.title)}', COURSES[${idx}].questions, false)"><b>${escapeHtml(c.title)}</b><br>${c.questions.length} QCM</div>`;});
  html+=`</div>`;
  document.getElementById("app").innerHTML=html;
}
function startSession(title, qs, mastery){
  const mixed=shuffle(qs).map(q=>{const opts=q.options.map((text,i)=>({text,original:i})); return {...q,mixedOptions:shuffle(opts)};});
  session={title,questions:mixed,current:0,corrected:false,score:0,answered:0,missed:[],stats:initStats(mixed),mastery};
  renderQuestion();
}
function topbar(){
  const total=session.questions.length, note=session.answered?((session.score/session.answered)*20).toFixed(2):"0";
  return `<div class="topbar"><b>${escapeHtml(session.title)}</b><br>Question ${Math.min(session.current+1,total)} / ${total} · Score : <b>${session.score} / ${session.answered}</b> · Note actuelle : <b>${note}/20</b></div>`;
}
function renderQuestion(){
  if(session.current>=session.questions.length) return finish();
  const q=session.questions[session.current];
  let opts="";
  q.mixedOptions.forEach((op,idx)=>{opts+=`<label class="option"><input type="checkbox" value="${op.original}"><span><b>${String.fromCharCode(65+idx)}.</b> ${escapeHtml(op.text)}</span></label>`;});
  document.getElementById("app").innerHTML=topbar()+`<div class="qbox"><div class="origin">${escapeHtml(q.course)}</div><div class="qtitle">${escapeHtml(q.q)}</div><div id="options">${opts}</div><button id="mainBtn" class="mainBtn" onclick="mainAction()">Corriger</button><div id="feedback" class="feedback hidden"></div></div>`;
  session.corrected=false;
}
function mainAction(){ if(!session.corrected) correctCurrent(); else nextQuestion(); }
function correctCurrent(){
  const q=session.questions[session.current], inputs=[...document.querySelectorAll("#options input")];
  const selected=inputs.filter(i=>i.checked).map(i=>Number(i.value)), ok=same(selected,q.correct);
  inputs.forEach(inp=>{const val=Number(inp.value), lab=inp.closest(".option"); inp.disabled=true; if(q.correct.includes(val)) lab.classList.add("good"); else if(selected.includes(val)) lab.classList.add("bad");});
  session.answered++;
  if(ok){session.score++; session.stats[q.course].good++;} else {session.missed.push(q); session.stats[q.course].missed++; if(session.mastery){const opts=q.options.map((text,i)=>({text,original:i})); session.questions.push({...q,mixedOptions:shuffle(opts)});}}
  const fb=document.getElementById("feedback"); fb.classList.remove("hidden");
  fb.innerHTML=`${ok?"✅ Bonne réponse.":"❌ Réponse incorrecte."}<br><b>Réponses correctes :</b> ${letters(q.correct)}<br><br><b>Explication :</b> ${escapeHtml(q.exp||"")}`;
  session.corrected=true;
  document.getElementById("mainBtn").textContent=(session.current===session.questions.length-1)?"Terminer":"Suivant";
}
function nextQuestion(){session.current++; if(session.current>=session.questions.length) finish(); else renderQuestion();}
function finish(){
  const total=session.questions.length, note=total?((session.score/total)*20).toFixed(2):"0";
  document.getElementById("app").innerHTML=`<div class="result"><h2>Résultat final</h2><p><b>Score :</b> ${session.score} / ${total}</p><p><b>Note :</b> ${note} / 20</p><p><b>Questions ratées :</b> ${session.missed.length}</p><button class="orangeBtn" onclick="retryMissed()">Reprendre les questions ratées</button><button class="greenBtn" onclick="masterMissed()">Maîtriser les questions ratées</button><button class="grayBtn" onclick="showMissedList()">Afficher la liste des QCM ratées</button><button class="grayBtn" onclick="showDashboard()">Tableau de bord</button><button class="mainBtn" onclick="startSession(session.title, session.questions, false)">Recommencer</button><button class="menuBtn" onclick="showMenu()">Menu principal</button></div>`;
}
function retryMissed(){if(session.missed.length===0)return alert("Aucune question ratée."); startSession("Reprise des questions ratées", session.missed, false);}
function masterMissed(){if(session.missed.length===0)return alert("Aucune question ratée."); startSession("Mode maîtrise — questions ratées", session.missed, true);}
function showMissedList(){
  let html=`<h2>Liste des QCM ratées</h2>`;
  if(session.missed.length===0) html+=`<div class="result">Aucune question ratée 🎉</div>`;
  session.missed.forEach((q,idx)=>{html+=`<div class="errItem"><b>${idx+1}. ${escapeHtml(q.course)}</b><br><b>Question :</b> ${escapeHtml(q.q)}<br><b>Bonnes réponses :</b> ${letters(q.correct)}<br><b>Explication :</b> ${escapeHtml(q.exp||"")}<br><button class="mainBtn" onclick="startSession('Question ciblée',[session.missed[${idx}]],false)">Refaire uniquement cette question</button></div>`;});
  html+=`<button class="menuBtn" onclick="showMenu()">Menu principal</button>`;
  document.getElementById("app").innerHTML=html;
}
function showDashboard(){
  let rows="";
  Object.entries(session.stats).forEach(([course,s])=>{const pct=s.total?Math.round((s.good/s.total)*100):0; const level=pct>=90?"🟢 Maîtrisé":pct>=70?"🟡 À revoir":"🔴 Prioritaire"; rows+=`<tr><td>${escapeHtml(course)}</td><td>${s.good}</td><td>${s.total}</td><td>${pct}%</td><td>${s.missed}</td><td><div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div></td><td>${level}</td><td><button class="orangeBtn" onclick="redoCourseErrors('${escapeAttr(course)}')">Refaire erreurs</button></td></tr>`;});
  document.getElementById("app").innerHTML=`<h2>Tableau de bord</h2><table class="dashboard-table"><tr><th>Cours</th><th>Bonnes</th><th>Total</th><th>%</th><th>Ratées</th><th>Progression</th><th>Niveau</th><th>Action</th></tr>${rows}</table><button class="menuBtn" onclick="showMenu()">Menu principal</button>`;
}
function redoCourseErrors(course){const qs=session.missed.filter(q=>q.course===course); if(qs.length===0)return alert("Aucune erreur pour ce cours."); startSession("Erreurs — "+course, qs, false);}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function escapeAttr(s){return escapeHtml(s).replace(/'/g,"&#39;");}
document.addEventListener("keydown",e=>{if(["1","2","3","4"].includes(e.key)&&!session.corrected){const inputs=[...document.querySelectorAll("#options input:not(:disabled)")]; const input=inputs[Number(e.key)-1]; if(input) input.checked=!input.checked;} if(e.key==="Enter"&&document.getElementById("mainBtn")){e.preventDefault(); mainAction();}});
showMenu();
</script>
</body>
</html>
